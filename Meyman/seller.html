<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Host Dashboard - Meyman</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="seller-app">

    <div class="container" style="background-color: var(--bg-main);">
        <header class="seller-header">
            <div>
                <h1>Host Dashboard</h1>
                <p class="motto">Your lifestyle is their experience <span style="font-size: 0.7em; opacity: 0.5; margin-left: 5px;">v1.1</span></p>
            </div>
            <div class="host-avatar">🧑</div>
        </header>

        <section class="seller-content">
            <div class="dashboard-metrics">
                <div class="metric-card">
                    <h4>Active Offers</h4>
                    <div class="value" id="active-offers-count">0</div>
                </div>
                <div class="metric-card">
                    <h4>Bookings</h4>
                    <div class="value" id="total-bookings-count">0</div>
                </div>
            </div>

            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                <h3 class="section-title">Your Offers</h3>
                <button class="btn btn-primary" style="padding: 0.5rem 1rem;" onclick="openCreateModal()">+ Create</button>
            </div>

            <div id="host-offers-list">
                <!-- Offers will be rendered here -->
            </div>

            <div style="margin-top:2rem; margin-bottom:1rem;">
                <h3 class="section-title">Customer Requests</h3>
            </div>
            
            <div id="customer-requests-list">
                <!-- Requests will be rendered here -->
            </div>
        </section>

        <!-- Create Offer Modal -->
        <div id="create-modal" class="modal-overlay hidden">
            <div class="bottom-sheet">
                <div class="sheet-handle"></div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h2>Create an Offer</h2>
                    <button class="btn-icon" style="box-shadow:none; border:none; width:30px; height:30px;" onclick="closeCreateModal()">✕</button>
                </div>
                
                <div class="form-group">
                    <label>What are you offering?</label>
                    <input type="text" id="offer-title" class="form-control" placeholder="Example: Home cooked dinner">
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <select id="offer-category" class="form-control">
                        <option value="Food">Food</option>
                        <option value="Stay">Stay</option>
                        <option value="Transport">Transport</option>
                        <option value="Events">Events</option>
                        <option value="Services">Services</option>
                    </select>
                </div>

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                    <div class="form-group">
                        <label>Price (KGS)</label>
                        <input type="number" id="offer-price" class="form-control" placeholder="200" min="0">
                    </div>
                    <div class="form-group">
                        <label>Spots Available</label>
                        <input type="number" id="offer-spots" class="form-control" placeholder="3" min="1">
                    </div>
                </div>

                <button class="btn btn-primary" style="width:100%; margin-top:0.5rem;" onclick="submitNewOffer()">Publish Offer</button>
            </div>
        </div>
    </div>

    <!-- Core State Framework (ICF Compliant) -->
    <script src="shared-state.js"></script>
    <script src="seller.js"></script>
</body>
</html>
