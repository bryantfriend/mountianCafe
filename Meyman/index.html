<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meyman - Experiences</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="customer-app">

    <div class="container">
        <!-- Main Top Bar -->
        <header class="top-bar">
            <div class="header-row">
                <div class="logo-area">
                    <div class="logo-icon">M</div>
                    <span style="font-weight:700; font-size:1.1rem;">Meyman</span>
                </div>
                <div style="display:flex; align-items:center; gap:8px;">
                    <div style="font-size:0.85rem; font-weight:600; background:white; padding:4px 8px; border-radius:12px; box-shadow:var(--shadow-sm);">📍 Bishkek</div>
                    <div style="font-size:0.85rem; font-weight:600; background:white; padding:4px 8px; border-radius:12px; box-shadow:var(--shadow-sm);">EN</div>
                    <div style="font-size:0.85rem; font-weight:800; background:var(--primary); color:white; padding:4px 8px; border-radius:12px; box-shadow:var(--shadow-sm);">v1.3</div>
                </div>
            </div>

            <div class="search-bar">
                <span>🔍</span>
                <input type="text" placeholder="Search experiences, food, places...">
            </div>

            <div class="categories-scroll" id="category-tabs">
                <div class="cat-pill active">All</div>
                <div class="cat-pill">Food</div>
                <div class="cat-pill">Stay</div>
                <div class="cat-pill">Transport</div>
                <div class="cat-pill">Events</div>
                <div class="cat-pill">Services</div>
            </div>
            
            <p class="motto">Your lifestyle is their experience</p>
        </header>

        <!-- 2GIS Map Background -->
        <div class="map-wrapper" style="position:absolute; top:0; left:0; width:100%; height:100%; z-index: 0;">
            <iframe src="https://maps.api.2gis.ru/2.0/widget?center=74.60,42.87&zoom=13" width="100%" height="100%" frameborder="0" style="border:none; pointer-events:none;"></iframe>
        </div>

        <!-- Interactive Map Layer -->
        <div id="interactive-map" style="position:absolute; top:0; left:0; width:100%; height:100%; z-index: 1; pointer-events:none;">
            <!-- Map Pins injected here by JS -->
        </div>

        <!-- Floating Happening Now Cards -->
        <section class="happening-now">
            <h3 class="section-title">Happening Now 🔥</h3>
            <div class="horizontal-feed" id="happening-feed">
                <!-- Offer Cards injected here by JS -->
            </div>
        </section>

        <!-- Detail Action Modal (Bottom Sheet Component) -->
        <div id="booking-modal" class="modal-overlay hidden">
            <div class="bottom-sheet" id="booking-sheet">
                <!-- Details injected here by JS -->
            </div>
        </div>

        <!-- Navigation -->
        <nav class="bottom-nav">
            <a href="#" class="nav-item active">
                <span class="nav-icon">🗺️</span>
                <span>Map</span>
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon" style="color:var(--primary);">➕</span>
                <span>New</span>
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon">📅</span>
                <span>Bookings</span>
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon">💬</span>
                <span>Inbox</span>
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon">👤</span>
                <span>Profile</span>
            </a>
        </nav>
    </div>

    <!-- Core State Framework (ICF Compliant) -->
    <script src="shared-state.js"></script>
    <script src="customer.js"></script>
</body>
</html>
